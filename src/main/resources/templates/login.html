<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <link rel="stylesheet" th:href="@{/css/app.css(v='20260316-login')}">
</head>
<body>
<div class="auth-wrap">
    <section class="auth-card auth-card-simple login-page-card">
        <p class="auth-card-kicker">LOGIN</p>
        <div class="auth-logo-wrap">
            <img class="auth-logo" th:src="@{/images/scentory-logo.svg}" alt="Scentory">
        </div>
        <p>管理画面へログインしてください。</p>
        <div class="flash flash-error" th:if="${param.error}">ログインに失敗しました。</div>
        <div class="flash" th:if="${param.logout}">ログアウトしました。</div>
        <form method="post" th:action="@{/login}">
            <div class="field">
                <label>ID</label>
                <input type="text" name="username" value="admin">
            </div>
            <div class="field">
                <label>パスワード</label>
                <input type="password" name="password" value="admin123">
            </div>
            <button class="btn auth-submit" type="submit">ログイン</button>
        </form>
        <div class="auth-links">
            <a th:href="@{/password/reset}">パスワード再設定</a>
            <a th:href="@{/terms}">利用規約</a>
            <a th:href="@{/privacy}">プライバシーポリシー</a>
            <a th:href="@{/contact}">お問い合わせ</a>
        </div>
    </section>
</div>
</body>
</html>
