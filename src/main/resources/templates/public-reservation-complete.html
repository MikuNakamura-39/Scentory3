<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約受付完了</title>
    <link rel="stylesheet" th:href="@{/css/app.css(v='20260316-login')}">
    <style>
        .public-wrap {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 32px;
            background:
                radial-gradient(circle at top left, rgba(141, 16, 22, .28), transparent 34%),
                linear-gradient(135deg, #181517, #3b3336 58%, #1f2329);
        }

        .public-card {
            width: min(720px, 100%);
            background: #fff;
            border-radius: 24px;
            padding: 36px 34px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, .25);
        }

        .public-card h1 {
            margin: 0 0 12px;
            font-size: 34px;
            font-family: Georgia, "Times New Roman", serif;
            color: #1f2329;
            font-weight: 600;
        }

        .public-card p {
            margin: 0 0 14px;
            line-height: 1.9;
            color: #4b5563;
        }

        .public-meta {
            margin: 22px 0 0;
            padding: 18px 20px;
            border-radius: 16px;
            background: #f8f5f5;
            border: 1px solid #ece2e2;
        }

        .public-meta strong {
            display: block;
            margin-bottom: 8px;
            color: #8d1016;
            letter-spacing: .12em;
            font-size: 12px;
        }

        .public-list {
            display: grid;
            gap: 0;
            margin-top: 10px;
        }

        .public-item {
            padding: 14px 0 12px;
            border-bottom: 1px solid #ece2e2;
        }

        .public-item:last-child {
            border-bottom: 0;
        }

        .public-label {
            margin: 0 0 6px;
            font-size: 11px;
            letter-spacing: .14em;
            color: #8d1016;
        }

        .public-value {
            margin: 0;
            color: #374151;
            line-height: 1.9;
            white-space: pre-wrap;
        }

        .public-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 30px;
        }

        .public-back {
            font-size: 14px;
            color: #4b5563;
            text-decoration: underline;
            text-underline-offset: 4px;
        }
    </style>
</head>
<body>
<div class="public-wrap">
    <div class="public-card">
        <h1>予約が完了しました。<br>当日お待ちしております。</h1>
        <p th:if="${reservationError != null}" th:text="${reservationError}">入力内容を確認してください。</p>
        <p th:if="${reservationError == null}">以下の内容でご予約を受け付けました。</p>
        <div class="public-meta" th:if="${reservationError == null}">
            <strong>RESERVATION INFO</strong>
            <div class="public-list">
                <div class="public-item">
                    <p class="public-label">予約番号</p>
                    <p class="public-value" th:text="${reservationNumber}">予約番号</p>
                </div>
                <div class="public-item">
                    <p class="public-label">お名前</p>
                    <p class="public-value" th:text="${customerName}">お名前</p>
                </div>
                <div class="public-item">
                    <p class="public-label">日時</p>
                    <p class="public-value" th:text="${#temporals.format(reservationDateTime, 'yyyy年M月d日 HH:mm')}">日時</p>
                </div>
            </div>
        </div>
        <div class="public-actions">
            <a class="public-back" href="file:///C:/academia/src/portfolio/portfolio-templates/LP/LP.html#top">トップに戻る</a>
        </div>
    </div>
</div>
</body>
</html>
