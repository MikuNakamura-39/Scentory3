<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>枠フォーム</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <main class="main">
        <h1 class="page-title" th:text="${pageTitle}"></h1>
        <p class="subtle" style="margin: 8px 0 18px;">受付を停止したい枠は「枠を閉じる」を選択してください。</p>
        <form th:action="@{/slots/save}" th:object="${slot}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="grid two">
                <div class="field"><label>開始日時</label><input type="datetime-local" th:field="*{startAt}"><small class="field-error" th:errors="*{startAt}"></small></div>
                <div class="field"><label>終了日時</label><input type="datetime-local" th:field="*{endAt}"><small class="field-error" th:errors="*{endAt}"></small></div>
                <div class="field"><label>定員</label><input type="number" min="1" th:field="*{capacity}"><small class="field-error" th:errors="*{capacity}"></small></div>
                <div class="field"><label>予約済数</label><input type="number" min="0" th:field="*{bookedCount}"><small class="field-error" th:errors="*{bookedCount}"></small></div>
                <div class="field"><label>スタッフ</label><select th:field="*{staff}"><option value="">選択してください</option><option th:each="s : ${staffs}" th:value="${s.id}" th:text="${s.name}"></option></select><small class="field-error" th:errors="*{staff}"></small></div>
                <div class="field"><label>メニュー</label><select th:field="*{workshopMenu}"><option value="">選択してください</option><option th:each="m : ${menus}" th:value="${m.id}" th:text="${m.name}"></option></select><small class="field-error" th:errors="*{workshopMenu}"></small></div>
                <div class="field"><label>受付状態</label><select th:field="*{accepting}"><option th:value="true">受付中</option><option th:value="false">枠を閉じる</option></select></div>
                <div class="field"><label>枠種別</label><input type="text" th:field="*{slotType}" placeholder="通常営業 / 休業 / 管理画面設定など"></div>
            </div>
            <div class="actions"><a class="btn secondary" th:href="@{/slots}">戻る</a><button class="btn" type="submit">保存</button></div>
        </form>
    </main>
</div>
</body>
</html>
