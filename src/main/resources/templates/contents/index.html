<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>コンテンツ管理</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <main class="main content-page">
        <div class="page-header"><h1 class="page-title">コンテンツ管理</h1></div>
        <div class="flash" th:if="${message}" th:text="${message}"></div>
        <div class="grid two">
            <div class="card"><h2>お知らせ</h2><a class="btn" th:href="@{/contents/notices/new}">新規登録</a><ul><li th:each="item : ${notices}"><a th:href="@{'/contents/notices/' + ${item.id} + '/edit'}" th:text="${item.title}"></a></li></ul></div>
            <div class="card"><h2>FAQ</h2><a class="btn" th:href="@{/contents/faqs/new}">新規登録</a><ul><li th:each="item : ${faqs}"><a th:href="@{'/contents/faqs/' + ${item.id} + '/edit'}" th:text="${item.question}"></a></li></ul></div>
        </div>
        <div class="card" style="margin-top:18px;"><h2>LP / バナー管理</h2><form th:action="@{/contents/banner}" method="post"><div class="field"><label>バナーメッセージ</label><input name="bannerMessage"></div><button class="btn" type="submit">保存</button></form></div>
    </main>
</div>
</body>
</html>
