<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>レポート</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <main class="main report-page">
        <h1 class="page-title">レポート・集計</h1>
        <div class="grid two">
            <div class="card"><h2>ステータス別予約数</h2><ul><li th:each="item : ${byStatus.entrySet()}" th:text="${item.key.label + ' : ' + item.value}"></li></ul></div>
            <div class="card"><h2>チャネル別集計</h2><ul><li th:each="item : ${byChannel.entrySet()}" th:text="${item.key + ' : ' + item.value}"></li></ul></div>
        </div>
    </main>
</div>
</body>
</html>
