<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<body>
<div class="mobile-nav-shell" th:fragment="sidebar">
    <button class="mobile-nav-toggle" type="button" aria-label="メニューを開く" aria-controls="appSidebar" aria-expanded="false">
        <span></span><span></span><span></span>
    </button>
    <button class="mobile-nav-backdrop" type="button" aria-label="メニューを閉じる" hidden></button>
    <aside class="sidebar" id="appSidebar">
        <div class="brand">
            <img th:src="@{/images/scentory-logo.svg}" src="/images/scentory-logo.svg" alt="Scentory">
        </div>
        <div class="nav-group">
            <div class="nav-group-title">MAIN</div>
            <a class="nav-link" th:href="@{/dashboard}"
               th:classappend="${currentPath == '/' or currentPath == '/dashboard'} ? ' is-active' : ''"
               th:attr="aria-current=${currentPath == '/' or currentPath == '/dashboard'} ? 'page' : null">ダッシュボード</a>
            <a class="nav-link" th:href="@{/reservations}"
               th:classappend="${#strings.startsWith(currentPath, '/reservations')} ? ' is-active' : ''"
               th:attr="aria-current=${#strings.startsWith(currentPath, '/reservations')} ? 'page' : null">予約管理</a>
            <a class="nav-link" th:href="@{/slots}"
               th:classappend="${#strings.startsWith(currentPath, '/slots')} ? ' is-active' : ''"
               th:attr="aria-current=${#strings.startsWith(currentPath, '/slots')} ? 'page' : null">スケジュール管理</a>
            <a class="nav-link" th:href="@{/customers}"
               th:classappend="${#strings.startsWith(currentPath, '/customers')} ? ' is-active' : ''"
               th:attr="aria-current=${#strings.startsWith(currentPath, '/customers')} ? 'page' : null">顧客管理</a>
            <a class="nav-link" th:href="@{/menus}"
               th:classappend="${#strings.startsWith(currentPath, '/menus')} ? ' is-active' : ''"
               th:attr="aria-current=${#strings.startsWith(currentPath, '/menus')} ? 'page' : null">商品・メニュー</a>
            <a class="nav-link" th:if="${isAdmin}" th:href="@{/contents}"
               th:classappend="${#strings.startsWith(currentPath, '/contents')} ? ' is-active' : ''"
               th:attr="aria-current=${#strings.startsWith(currentPath, '/contents')} ? 'page' : null">コンテンツ管理</a>
            <a class="nav-link" th:if="${isAdmin}" th:href="@{/staff}"
               th:classappend="${#strings.startsWith(currentPath, '/staff')} ? ' is-active' : ''"
               th:attr="aria-current=${#strings.startsWith(currentPath, '/staff')} ? 'page' : null">スタッフ管理</a>
            <a class="nav-link" th:if="${isAdmin or isStaff or isViewer}" th:href="@{/reports}"
               th:classappend="${#strings.startsWith(currentPath, '/reports')} ? ' is-active' : ''"
               th:attr="aria-current=${#strings.startsWith(currentPath, '/reports')} ? 'page' : null">レポート</a>
            <a class="nav-link" th:if="${isAdmin}" th:href="@{/settings}"
               th:classappend="${#strings.startsWith(currentPath, '/settings')} ? ' is-active' : ''"
               th:attr="aria-current=${#strings.startsWith(currentPath, '/settings')} ? 'page' : null">システム設定</a>
            <a class="nav-link" th:href="@{/account}"
               th:classappend="${#strings.startsWith(currentPath, '/account')} ? ' is-active' : ''"
               th:attr="aria-current=${#strings.startsWith(currentPath, '/account')} ? 'page' : null">アカウント</a>
            <form th:action="@{/logout}" method="post" class="logout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="nav-link nav-link-button">ログアウト</button>
            </form>
        </div>
    </aside>
    <script>
        (() => {
            if (!document.querySelector('meta[name="viewport"]')) {
                const viewportMeta = document.createElement('meta');
                viewportMeta.name = 'viewport';
                viewportMeta.content = 'width=device-width, initial-scale=1.0';
                document.head.appendChild(viewportMeta);
            }

            const shell = document.currentScript?.parentElement;
            if (!shell || !shell.classList.contains('mobile-nav-shell')) return;
            const toggle = shell.querySelector('.mobile-nav-toggle');
            const backdrop = shell.querySelector('.mobile-nav-backdrop');
            const sidebar = shell.querySelector('.sidebar');
            if (!toggle || !backdrop || !sidebar) return;

            const closeMenu = () => {
                shell.classList.remove('is-open');
                toggle.setAttribute('aria-expanded', 'false');
                backdrop.hidden = true;
                document.body.classList.remove('mobile-nav-open');
            };

            const openMenu = () => {
                shell.classList.add('is-open');
                toggle.setAttribute('aria-expanded', 'true');
                backdrop.hidden = false;
                document.body.classList.add('mobile-nav-open');
            };

            toggle.addEventListener('click', () => {
                if (shell.classList.contains('is-open')) {
                    closeMenu();
                    return;
                }
                openMenu();
            });

            backdrop.addEventListener('click', closeMenu);
            sidebar.querySelectorAll('a, button.nav-link-button').forEach((item) => item.addEventListener('click', closeMenu));
            window.addEventListener('resize', () => {
                if (window.innerWidth > 900) {
                    closeMenu();
                }
            });
        })();
    </script>
</div>
</body>
</html>
