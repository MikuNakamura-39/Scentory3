<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>スタッフ管理</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <main class="main">
        <div class="page-header">
            <h1 class="page-title">スタッフ管理</h1>
            <a class="btn" th:href="@{/staff/new}">スタッフ登録</a>
        </div>
        <table>
            <tr><th>氏名</th><th>メールアドレス</th><th>権限</th><th></th></tr>
            <tr th:each="item : ${staffs}">
                <td data-label="氏名" th:text="${item.name}"></td>
                <td data-label="メールアドレス" th:text="${item.email}"></td>
                <td data-label="権限" th:text="${item.roleType}"></td>
                <td data-label="操作">
                    <div class="inline-actions">
                        <a class="mini-btn" th:href="@{'/staff/' + ${item.id} + '/edit'}">編集</a>
                    </div>
                </td>
            </tr>
        </table>
    </main>
</div>
</body>
</html>
