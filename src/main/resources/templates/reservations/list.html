<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>予約管理</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <main class="main">
        <div class="page-header">
            <h1 class="page-title">予約管理</h1>
            <a class="btn" th:href="@{/reservations/new}">新規予約</a>
        </div>
        <div class="flash" th:if="${message}" th:text="${message}"></div>
        <section class="calendar-panel">
            <div class="calendar-panel-head">
                <div class="calendar-month-picker">
                    <button class="calendar-panel-title-button" type="button" id="calendarMonthPickerButton">
                        <h2 class="calendar-panel-title" id="calendarTitle">2026年3月</h2>
                    </button>
                    <form id="calendarMonthForm" th:action="@{/reservations}" method="get">
                        <input type="hidden" id="calendarMonthInput" name="calendarMonth" th:value="${calendarMonth}">
                        <input type="hidden" name="reservationDate" th:value="${reservationDate}">
                        <input type="hidden" name="keyword" th:value="${keyword}">
                        <input type="hidden" name="channel" th:value="${channel}">
                        <input type="hidden" name="partySize" th:value="${partySize}">
                        <input type="hidden" name="status" th:value="${selectedStatus != null ? selectedStatus.name() : ''}">
                    </form>
                    <div class="month-picker-popover" id="calendarMonthPopover" hidden>
                        <div class="month-picker-head">
                            <button class="month-picker-arrow" type="button" id="calendarYearPrev">◀</button>
                            <strong id="calendarYearLabel">2026</strong>
                            <button class="month-picker-arrow" type="button" id="calendarYearNext">▶</button>
                        </div>
                        <div class="month-picker-grid" id="calendarMonthGrid"></div>
                    </div>
                </div>
                <div class="calendar-panel-actions">
                    <button class="page-btn" type="button" id="calendarPrevButton">
                        前月
                    </button>
                    <button class="page-btn" type="button" id="calendarNextButton">
                        次月
                    </button>
                </div>
            </div>
            <div class="reservation-calendar" id="reservationCalendar"></div>
        </section>
        <div class="reservation-filter-mobile-bar">
            <button class="btn secondary reservation-filter-toggle" type="button" id="reservationFilterToggle">絞り込み</button>
        </div>
        <form class="toolbar wrap reservation-filter-form" method="get" th:action="@{/reservations}" style="margin-top:18px;" id="reservationFilterForm">
            <input type="date" name="reservationDate" th:value="${reservationDate}">
            <input type="hidden" name="calendarMonth" id="filterCalendarMonth" th:value="${calendarMonth}">
            <input type="text" name="keyword" th:value="${keyword}" placeholder="顧客名で検索">
            <input type="text" name="channel" th:value="${channel}" placeholder="チャネルで検索">
            <select name="partySize">
                <option value="">すべての人数</option>
                <option value="1" th:selected="${partySize == 1}">1名</option>
                <option value="2" th:selected="${partySize == 2}">2名</option>
                <option value="3" th:selected="${partySize == 3}">3名</option>
                <option value="4" th:selected="${partySize == 4}">4名</option>
                <option value="5" th:selected="${partySize == 5}">5名</option>
                <option value="6" th:selected="${partySize == 6}">6名</option>
                <option value="7" th:selected="${partySize == 7}">7名</option>
                <option value="8" th:selected="${partySize == 8}">8名</option>
                <option value="9" th:selected="${partySize == 9}">9名</option>
                <option value="10" th:selected="${partySize == 10}">10名</option>
            </select>
            <select name="status">
                <option value="">すべての状態</option>
                <option th:each="status : ${statuses}" th:value="${status.name()}" th:text="${status.label}" th:selected="${selectedStatus == status}"></option>
            </select>
            <div class="reservation-filter-actions">
                <button class="btn secondary" type="submit">検索</button>
                <button class="btn secondary reservation-filter-close" type="button" id="reservationFilterClose">閉じる</button>
            </div>
        </form>
        <table>
            <tr><th>予約番号</th><th>顧客</th><th>予約日時</th><th>人数</th><th>チャネル</th><th>状態</th><th></th></tr>
            <tr th:each="item : ${reservations}"
                th:attr="data-reservation-id=${item.id},
                         data-start-at=${item.timeSlot != null ? #temporals.format(item.timeSlot.startAt, 'yyyy-MM-dd''T''HH:mm') : ''},
                         data-customer-name=${item.customer != null ? item.customer.fullName : '-'},
                         data-status-name=${item.status.name().toLowerCase()}">
                <td data-label="予約番号"><a th:href="@{'/reservations/' + ${item.id}}" th:text="${item.reservationNumber}"></a></td>
                <td data-label="顧客" th:text="${item.customer != null ? item.customer.fullName : '-'}"></td>
                <td data-label="予約日時" th:text="${item.timeSlot != null ? #temporals.format(item.timeSlot.startAt, 'yyyy/MM/dd HH:mm') : '-'}"></td>
                <td data-label="人数" th:text="${item.partySize}"></td>
                <td data-label="チャネル" th:text="${item.channel}"></td>
                <td data-label="状態">
                    <form class="status-inline-form" th:action="@{'/reservations/' + ${item.id} + '/status'}" method="post">
                        <input type="hidden" name="redirectTo" value="list">
                        <input type="hidden" name="redirectPage" th:value="${currentPage}">
                        <input type="hidden" name="redirectStatus" th:value="${selectedStatus != null ? selectedStatus.name() : ''}">
                        <input type="hidden" name="redirectKeyword" th:value="${keyword}">
                        <input type="hidden" name="redirectChannel" th:value="${channel}">
                        <input type="hidden" name="redirectPartySize" th:value="${partySize}">
                        <input type="hidden" name="redirectReservationDate" th:value="${reservationDate}">
                        <input type="hidden" name="redirectCalendarMonth" th:value="${calendarMonth}">
                        <select class="status-select"
                                name="status"
                                th:classappend="' status-' + ${item.status.name().toLowerCase()}"
                                onchange="this.form.submit()">
                            <option th:each="status : ${statuses}"
                                    th:value="${status.name()}"
                                    th:text="${status.label}"
                                    th:selected="${item.status == status}">
                            </option>
                        </select>
                    </form>
                </td>
                <td data-label="操作">
                    <div class="inline-actions">
                        <a class="mini-btn secondary" th:href="@{'/reservations/' + ${item.id}}">詳細</a>
                        <a class="mini-btn" th:href="@{'/reservations/' + ${item.id} + '/edit'}">編集</a>
                    </div>
                </td>
            </tr>
        </table>
        <div class="pagination" th:if="${totalPages > 1}">
            <a class="page-btn" th:classappend="${!hasPrevious} ? ' disabled'" th:href="${hasPrevious} ? @{/reservations(page=${currentPage - 1}, status=${selectedStatus}, keyword=${keyword}, channel=${channel}, partySize=${partySize}, reservationDate=${reservationDate})} : '#'">前へ</a>
            <span class="page-status" th:text="${currentPage + ' / ' + totalPages}"></span>
            <a class="page-btn" th:classappend="${!hasNext} ? ' disabled'" th:href="${hasNext} ? @{/reservations(page=${currentPage + 1}, status=${selectedStatus}, keyword=${keyword}, channel=${channel}, partySize=${partySize}, reservationDate=${reservationDate})} : '#'">次へ</a>
        </div>
    </main>
</div>
<script>
    (() => {
        const calendarTitle = document.getElementById('calendarTitle');
        const calendarRoot = document.getElementById('reservationCalendar');
        const prevButton = document.getElementById('calendarPrevButton');
        const nextButton = document.getElementById('calendarNextButton');
        const monthPickerButton = document.getElementById('calendarMonthPickerButton');
        const monthInput = document.getElementById('calendarMonthInput');
        const monthForm = document.getElementById('calendarMonthForm');
        const monthPopover = document.getElementById('calendarMonthPopover');
        const yearPrevButton = document.getElementById('calendarYearPrev');
        const yearNextButton = document.getElementById('calendarYearNext');
        const yearLabel = document.getElementById('calendarYearLabel');
        const monthGrid = document.getElementById('calendarMonthGrid');
        const filterCalendarMonth = document.getElementById('filterCalendarMonth');
        const filterForm = document.getElementById('reservationFilterForm');
        const filterToggle = document.getElementById('reservationFilterToggle');
        const filterClose = document.getElementById('reservationFilterClose');
        const statusForms = Array.from(document.querySelectorAll('.status-inline-form'));
        const reservationRows = Array.from(document.querySelectorAll('table tr[data-start-at]'));
        const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
        const monthLabels = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];

        const reservations = reservationRows
            .map((row) => ({
                id: row.dataset.reservationId,
                startAt: row.dataset.startAt,
                customerName: row.dataset.customerName || '-',
                statusName: row.dataset.statusName || 'requested'
            }))
            .filter((item) => item.startAt && item.statusName !== 'cancelled');

        const parseMonthValue = (value) => {
            if (!value || !/^\d{4}-\d{2}$/.test(value)) return null;
            const [year, month] = value.split('-').map(Number);
            return { year, month };
        };

        const toMonthValue = (year, month) => `${year}-${String(month).padStart(2, '0')}`;

        const getInitialMonth = () => {
            const inputMonth = parseMonthValue('[[${calendarMonth}]]');
            if (inputMonth) return inputMonth;
            if (reservations.length > 0) {
                const [year, month] = reservations[0].startAt.split('T')[0].split('-').map(Number);
                return { year, month };
            }
            const now = new Date();
            return { year: now.getFullYear(), month: now.getMonth() + 1 };
        };

        let currentMonth = getInitialMonth();
        let pickerYear = currentMonth.year;
        const today = new Date();
        const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());

        const syncMonthFields = (monthValue) => {
            if (monthInput) monthInput.value = monthValue;
            if (filterCalendarMonth) filterCalendarMonth.value = monthValue;
        };

        const renderCalendar = () => {
            if (!calendarRoot || !calendarTitle) return;
            const monthValue = toMonthValue(currentMonth.year, currentMonth.month);
            syncMonthFields(monthValue);
            calendarTitle.textContent = `${currentMonth.year}年${currentMonth.month}月`;

            const firstDay = new Date(currentMonth.year, currentMonth.month - 1, 1);
            const startOffset = firstDay.getDay();
            const daysInMonth = new Date(currentMonth.year, currentMonth.month, 0).getDate();
            const monthPrefix = `${currentMonth.year}-${String(currentMonth.month).padStart(2, '0')}`;

            const cells = weekdays.map((label) => `<div class="calendar-weekday">${label}</div>`);

            for (let index = 0; index < startOffset; index += 1) {
                cells.push('<div class="calendar-cell empty"></div>');
            }

            for (let day = 1; day <= daysInMonth; day += 1) {
                const dateKey = `${monthPrefix}-${String(day).padStart(2, '0')}`;
                const cellDate = new Date(currentMonth.year, currentMonth.month - 1, day);
                const pastClass = cellDate < todayDate ? ' is-past' : '';
                const items = reservations.filter((item) => item.startAt.startsWith(dateKey));
                const events = items.map((item) => {
                    const timeLabel = item.startAt.slice(11, 16);
                    return `
                        <a class="calendar-event status-${item.statusName}" href="/reservations/${item.id}">
                            <span class="calendar-event-time">${timeLabel}</span>
                            <span class="calendar-event-name">${item.customerName}</span>
                        </a>
                    `;
                }).join('');

                cells.push(`
                    <div class="calendar-cell${pastClass}">
                        <div class="calendar-cell-inner">
                            <div class="calendar-day-number">${day}</div>
                            <div class="calendar-events">${events}</div>
                        </div>
                    </div>
                `);
            }

            const remainder = cells.length % 7;
            if (remainder !== 0) {
                for (let index = 0; index < 7 - remainder; index += 1) {
                    cells.push('<div class="calendar-cell empty"></div>');
                }
            }

            calendarRoot.innerHTML = cells.join('');
        };

        const renderMonthPicker = () => {
            if (!monthGrid || !yearLabel) return;
            yearLabel.textContent = `${pickerYear}年`;
            monthGrid.innerHTML = monthLabels.map((label, index) => {
                const month = index + 1;
                const activeClass = pickerYear === currentMonth.year && month === currentMonth.month ? ' is-active' : '';
                return `<button type="button" class="month-picker-cell${activeClass}" data-month="${month}">${label}</button>`;
            }).join('');
        };

        prevButton?.addEventListener('click', () => {
            currentMonth.month -= 1;
            if (currentMonth.month < 1) {
                currentMonth.month = 12;
                currentMonth.year -= 1;
            }
            renderCalendar();
        });

        nextButton?.addEventListener('click', () => {
            currentMonth.month += 1;
            if (currentMonth.month > 12) {
                currentMonth.month = 1;
                currentMonth.year += 1;
            }
            renderCalendar();
        });

        monthPickerButton?.addEventListener('click', () => {
            if (!monthPopover) return;
            pickerYear = currentMonth.year;
            renderMonthPicker();
            monthPopover.hidden = !monthPopover.hidden;
        });

        yearPrevButton?.addEventListener('click', () => {
            pickerYear -= 1;
            renderMonthPicker();
        });

        yearNextButton?.addEventListener('click', () => {
            pickerYear += 1;
            renderMonthPicker();
        });

        monthGrid?.addEventListener('click', (event) => {
            const button = event.target.closest('[data-month]');
            if (!button || !monthForm) return;
            const selectedMonth = Number(button.dataset.month);
            const nextValue = toMonthValue(pickerYear, selectedMonth);
            syncMonthFields(nextValue);
            monthForm.submit();
        });

        document.addEventListener('click', (event) => {
            if (!monthPopover || monthPopover.hidden) return;
            if (event.target.closest('.calendar-month-picker')) return;
            monthPopover.hidden = true;
        });

        filterToggle?.addEventListener('click', () => {
            filterForm?.classList.add('is-open');
            document.body.classList.add('reservation-filter-open');
        });

        filterClose?.addEventListener('click', () => {
            filterForm?.classList.remove('is-open');
            document.body.classList.remove('reservation-filter-open');
        });

        statusForms.forEach((form) => {
            const select = form.querySelector('select[name="status"]');
            if (!select) return;

            form.addEventListener('submit', async (event) => {
                event.preventDefault();
                select.disabled = true;

                try {
                    const response = await fetch(form.action, {
                        method: 'POST',
                        body: new FormData(form),
                        credentials: 'same-origin'
                    });

                    if (!response.ok) {
                        throw new Error('status update failed');
                    }

                    window.location.href = window.location.href;
                } catch (error) {
                    select.disabled = false;
                    window.alert('ステータス更新に失敗しました。');
                }
            });
        });

        renderCalendar();
        renderMonthPicker();
    })();
</script>
</body>
</html>
