<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>メニューフォーム</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <main class="main">
        <h1 class="page-title" th:text="${pageTitle}"></h1>
        <form th:action="@{/menus/save}" th:object="${menu}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="grid two">
                <div class="field"><label>コース名</label><input th:field="*{name}"><small class="field-error" th:errors="*{name}"></small></div>
                <div class="field"><label>価格</label><input type="number" min="1" step="100" th:field="*{price}"><small class="field-error" th:errors="*{price}"></small></div>
                <div class="field"><label>所要時間（分）</label><input type="number" min="1" th:field="*{durationMinutes}"><small class="field-error" th:errors="*{durationMinutes}"></small></div>
                <div class="field"><label>公開状態</label><select th:field="*{active}"><option th:value="true">公開</option><option th:value="false">非公開</option></select></div>
            </div>
            <div class="field"><label>説明</label><textarea rows="6" th:field="*{description}"></textarea></div>
            <div class="actions"><a class="btn secondary" th:href="@{/menus}">戻る</a><button class="btn" type="submit">保存</button></div>
        </form>
    </main>
</div>
</body>
</html>
