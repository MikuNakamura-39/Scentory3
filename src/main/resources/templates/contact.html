<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="auth-wrap public-page-wrap">
    <section class="auth-card public-page-card public-page-content-card">
        <div class="auth-logo-wrap">
            <img class="auth-logo" th:src="@{/images/scentory-logo.svg}" alt="Scentory">
        </div>
        <h1 class="page-title public-page-title">お問い合わせ</h1>
        <p class="public-page-copy">内容を入力して送信してください。</p>
        <form>
            <div class="field">
                <label>件名</label>
                <input type="text">
            </div>
            <div class="field">
                <label>内容</label>
                <textarea rows="6"></textarea>
            </div>
            <div class="public-page-actions">
                <a class="btn secondary" th:href="@{/login}">戻る</a>
                <button class="btn" type="button">送信</button>
            </div>
        </form>
    </section>
</div>
</body>
</html>
