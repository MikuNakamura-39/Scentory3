<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>顧客詳細</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <main class="main">
        <div class="page-header">
            <h1 class="page-title">顧客詳細</h1>
            <div class="inline-actions">
                <a class="btn secondary" th:href="@{/customers}">一覧へ戻る</a>
                <a class="btn" th:href="@{'/customers/' + ${customer.id} + '/edit'}">編集</a>
            </div>
        </div>
        <div class="grid two">
            <div class="card">
                <h2>基本情報</h2>
                <div class="detail-list">
                    <div><span>氏名</span><strong th:text="${customer.fullName}"></strong></div>
                    <div><span>メールアドレス</span><strong th:text="${customer.email}"></strong></div>
                    <div><span>電話番号</span><strong th:text="${customer.phone}"></strong></div>
                    <div><span>流入チャネル</span><strong th:text="${customer.channel != null && !customer.channel.isBlank() ? customer.channel : '-'}"></strong></div>
                    <div><span>タグ</span><strong th:text="${customer.tags != null && !customer.tags.isBlank() ? customer.tags : '-'}"></strong></div>
                    <div><span>来店回数</span><strong th:text="${customer.visitCount + '回'}"></strong></div>
                </div>
            </div>
            <div class="card">
                <h2>メモ</h2>
                <p th:text="${customer.memo != null && !customer.memo.isBlank() ? customer.memo : 'メモは未登録です。'}"></p>
            </div>
        </div>
        <div class="card" style="margin-top: 18px;">
            <h2>予約履歴</h2>
            <table>
                <tr><th>予約番号</th><th>予約日時</th><th>人数</th><th>状態</th></tr>
                <tr th:each="item : ${reservations}">
                    <td data-label="予約番号"><a th:href="@{'/reservations/' + ${item.id}}" th:text="${item.reservationNumber}"></a></td>
                    <td data-label="予約日時" th:text="${item.timeSlot != null ? #temporals.format(item.timeSlot.startAt, 'yyyy/MM/dd HH:mm') : '-'}"></td>
                    <td data-label="人数" th:text="${item.partySize + '名'}"></td>
                    <td data-label="状態" th:text="${item.status.label}"></td>
                </tr>
            </table>
        </div>
    </main>
</div>
</body>
</html>
