<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>顧客フォーム</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <main class="main">
        <h1 class="page-title" th:text="${pageTitle}"></h1>
        <form th:action="@{/customers/save}" th:object="${customer}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="grid two">
                <div class="field"><label>氏名</label><input th:field="*{fullName}"><small class="field-error" th:errors="*{fullName}"></small></div>
                <div class="field"><label>メールアドレス</label><input th:field="*{email}"><small class="field-error" th:errors="*{email}"></small></div>
                <div class="field"><label>電話番号</label><input th:field="*{phone}"><small class="field-error" th:errors="*{phone}"></small></div>
                <div class="field"><label>流入チャネル</label><input th:field="*{channel}"></div>
                <div class="field"><label>タグ</label><input th:field="*{tags}"></div>
                <div class="field"><label>来店回数</label><input type="number" min="0" th:field="*{visitCount}"><small class="field-error" th:errors="*{visitCount}"></small></div>
            </div>
            <div class="field"><label>メモ</label><textarea rows="6" th:field="*{memo}"></textarea></div>
            <div class="actions"><a class="btn secondary" th:href="@{/customers}">戻る</a><button class="btn" type="submit">保存</button></div>
        </form>
    </main>
</div>
</body>
</html>
