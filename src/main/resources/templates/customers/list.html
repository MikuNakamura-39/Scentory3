<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>顧客管理</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <main class="main">
        <div class="page-header">
            <h1 class="page-title">顧客管理</h1>
            <a class="btn" th:href="@{/customers/new}">顧客登録</a>
        </div>
        <form class="toolbar" method="get">
            <input class="customer-search-input" name="keyword" th:value="${keyword}" placeholder="氏名・メールアドレス・電話番号で検索">
            <button class="btn secondary" type="submit">検索</button>
        </form>
        <table>
            <tr><th>氏名</th><th>メールアドレス</th><th>電話番号</th><th>来店回数</th><th></th></tr>
            <tr th:each="item : ${customers}">
                <td data-label="氏名"><a th:href="@{'/customers/' + ${item.id}}" th:text="${item.fullName}"></a></td>
                <td data-label="メールアドレス" th:text="${item.email}"></td>
                <td data-label="電話番号" th:text="${item.phone}"></td>
                <td data-label="来店回数" th:text="${item.visitCount}"></td>
                <td data-label="操作">
                    <div class="inline-actions">
                        <a class="mini-btn secondary" th:href="@{'/customers/' + ${item.id}}">詳細</a>
                        <a class="mini-btn" th:href="@{'/customers/' + ${item.id} + '/edit'}">編集</a>
                    </div>
                </td>
            </tr>
        </table>
    </main>
</div>
</body>
</html>
