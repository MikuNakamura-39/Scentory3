<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>スケジュール管理</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <main class="main">
        <div class="page-header">
            <h1 class="page-title">スケジュール管理</h1>
            <a class="btn" th:href="@{/slots/new}">枠編集</a>
        </div>
        <section class="schedule-layout">
            <aside class="card schedule-mini-calendar">
                <div class="schedule-mini-head">
                    <a class="schedule-period-link"
                       th:href="@{/slots(calendarMonth=${previousCalendarMonth}, scheduleDate=${previousCalendarMonth + '-01'})}">
                        ◀
                    </a>
                    <div class="calendar-month-picker schedule-month-picker">
                        <button class="calendar-panel-title-button" type="button" id="scheduleMonthPickerButton">
                            <h2 th:text="${calendarLabel}" id="scheduleCalendarTitle">2026年3月</h2>
                        </button>
                        <form id="scheduleMonthForm" th:action="@{/slots}" method="get">
                            <input type="hidden" id="scheduleMonthInput" name="calendarMonth" th:value="${calendarMonth}">
                            <input type="hidden" name="scheduleDate" th:value="${scheduleDate}">
                            <input type="hidden" name="staffId" th:value="${selectedStaffId}">
                        </form>
                        <div class="month-picker-popover" id="scheduleMonthPopover" hidden>
                            <div class="month-picker-head">
                                <button class="month-picker-arrow" type="button" id="scheduleYearPrev">◀</button>
                                <strong id="scheduleYearLabel">2026年</strong>
                                <button class="month-picker-arrow" type="button" id="scheduleYearNext">▶</button>
                            </div>
                            <div class="month-picker-grid" id="scheduleMonthGrid"></div>
                        </div>
                    </div>
                    <a class="schedule-period-link"
                       th:href="@{/slots(calendarMonth=${nextCalendarMonth}, scheduleDate=${nextCalendarMonth + '-01'})}">
                        ▶
                    </a>
                </div>
                <div class="schedule-mini-weekdays">
                    <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
                </div>
                <div class="schedule-mini-grid" id="scheduleMiniCalendar"></div>
                <div id="scheduleCalendarSource" hidden>
                    <div th:each="cell : ${calendarCells}"
                         th:attr="data-blank=${cell.blank},
                                  data-selected=${cell.selected},
                                  data-today=${cell.today},
                                  data-date=${cell.date},
                                  data-day-label=${cell.dayLabel}">
                    </div>
                </div>
            </aside>

            <section class="card schedule-board-panel">
            <div class="schedule-board-head">
                <div class="schedule-period-group">
                    <h2 class="schedule-board-title" th:text="${scheduleDateLabel ?: '対象日未設定'}">2026年3月25日</h2>
                </div>
                <div class="schedule-board-actions">
                    <a class="page-btn"
                       th:href="@{/slots(calendarMonth=${previousDateMonth}, scheduleDate=${previousDate})}">
                        前日
                    </a>
                    <a class="page-btn"
                       th:href="@{/slots(calendarMonth=${nextDateMonth}, scheduleDate=${nextDate})}">
                        翌日
                    </a>
                </div>
            </div>

            <div class="schedule-grid-board">
                <div class="schedule-grid-header">
                    <div class="schedule-staff-cell schedule-staff-head"></div>
                    <div class="schedule-time-header" th:style="|grid-template-columns: repeat(${timelineColumnCount ?: 1}, minmax(0, 1fr));|">
                        <div class="schedule-time-cell" th:each="hour : ${timelineHours}" th:text="${hour}">11:00</div>
                    </div>
                </div>

                <div class="schedule-grid-row" th:each="row : ${scheduleRows}">
                    <div class="schedule-staff-cell" th:text="${row.staffName}">スタッフ名</div>
                    <div class="schedule-track-wrap">
                        <div class="schedule-time-grid" th:style="|grid-template-columns: repeat(${timelineColumnCount ?: 1}, minmax(0, 1fr));|">
                            <div class="schedule-grid-slot" th:each="hour : ${timelineHours}"></div>
                        </div>
                        <div class="schedule-event-layer" th:if="${!#lists.isEmpty(row.events)}">
                            <div class="schedule-event-block"
                                 th:each="event : ${row.events}"
                                 th:classappend="' ' + ${event.statusClass}"
                                 th:style="|left:${event.leftPosition}%; width:${event.widthSize}%;|">
                                <strong th:text="${event.customerName != '顧客未設定' and !#strings.endsWith(event.customerName, '様') ? event.customerName + '様' : event.customerName}">顧客名</strong>
                                <span th:text="${event.partyLabel}">1名</span>
                                <small th:text="${event.timeLabel + ' / ' + event.statusLabel}">11:00 - 12:00 / 確定</small>
                            </div>
                        </div>
                        <p class="schedule-row-empty" th:if="${#lists.isEmpty(row.events)}"></p>
                    </div>
                </div>

                <div class="schedule-grid-row" th:if="${#lists.isEmpty(scheduleRows)}" th:each="staff : ${staffs}">
                    <div class="schedule-staff-cell" th:text="${staff.name}">スタッフ名</div>
                    <div class="schedule-track-wrap">
                        <div class="schedule-time-grid" th:style="|grid-template-columns: repeat(${timelineColumnCount ?: 1}, minmax(0, 1fr));|">
                            <div class="schedule-grid-slot" th:each="hour : ${timelineHours}"></div>
                        </div>
                        <p class="schedule-row-empty"></p>
                    </div>
                </div>

                <p class="subtle" th:if="${#lists.isEmpty(staffs)}" style="padding: 18px;">スタッフが登録されていません。</p>
            </div>
            </section>
        </section>
    </main>
</div>
<script>
    (() => {
        const root = document.getElementById('scheduleMiniCalendar');
        const source = Array.from(document.querySelectorAll('#scheduleCalendarSource > div'));
        const monthValue = '[[${calendarMonth}]]';
        const monthPickerButton = document.getElementById('scheduleMonthPickerButton');
        const monthInput = document.getElementById('scheduleMonthInput');
        const monthForm = document.getElementById('scheduleMonthForm');
        const monthPopover = document.getElementById('scheduleMonthPopover');
        const yearPrevButton = document.getElementById('scheduleYearPrev');
        const yearNextButton = document.getElementById('scheduleYearNext');
        const yearLabel = document.getElementById('scheduleYearLabel');
        const monthGrid = document.getElementById('scheduleMonthGrid');
        const monthLabels = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        if (!root || source.length === 0 || !monthValue) return;

        const parseMonthValue = (value) => {
            if (!value || !/^\\d{4}-\\d{2}$/.test(value)) return null;
            const [year, month] = value.split('-').map(Number);
            return { year, month };
        };

        const toMonthValue = (year, month) => `${year}-${String(month).padStart(2, '0')}`;
        const currentMonth = parseMonthValue(monthValue) || { year: new Date().getFullYear(), month: new Date().getMonth() + 1 };
        let pickerYear = currentMonth.year;

        root.innerHTML = source.map((item) => {
            const blank = item.dataset.blank === 'true';
            if (blank) {
                return '<span class="schedule-mini-cell is-blank"></span>';
            }

            const selectedClass = item.dataset.selected === 'true' ? ' is-selected' : '';
            const todayClass = item.dataset.today === 'true' ? ' is-today' : '';
            const dateValue = item.dataset.date;
            const dayLabel = item.dataset.dayLabel || '';

            return `
                <a class="schedule-mini-cell${selectedClass}${todayClass}" href="/slots?calendarMonth=${monthValue}&scheduleDate=${dateValue}">
                    <span>${dayLabel}</span>
                </a>
            `;
        }).join('');

        const renderMonthPicker = () => {
            if (!monthGrid || !yearLabel) return;
            yearLabel.textContent = `${pickerYear}年`;
            monthGrid.innerHTML = monthLabels.map((label, index) => {
                const month = index + 1;
                const activeClass = pickerYear === currentMonth.year && month === currentMonth.month ? ' is-active' : '';
                return `<button type="button" class="month-picker-cell${activeClass}" data-month="${month}">${label}</button>`;
            }).join('');
        };

        monthPickerButton?.addEventListener('click', () => {
            if (!monthPopover) return;
            pickerYear = currentMonth.year;
            renderMonthPicker();
            monthPopover.hidden = !monthPopover.hidden;
        });

        yearPrevButton?.addEventListener('click', () => {
            pickerYear -= 1;
            renderMonthPicker();
        });

        yearNextButton?.addEventListener('click', () => {
            pickerYear += 1;
            renderMonthPicker();
        });

        monthGrid?.addEventListener('click', (event) => {
            const button = event.target.closest('[data-month]');
            if (!button || !monthInput || !monthForm) return;
            monthInput.value = toMonthValue(pickerYear, Number(button.dataset.month));
            monthForm.submit();
        });

        document.addEventListener('click', (event) => {
            if (!monthPopover || monthPopover.hidden) return;
            if (event.target.closest('.calendar-month-picker')) return;
            monthPopover.hidden = true;
        });

        renderMonthPicker();
    })();
</script>
</body>
</html>
