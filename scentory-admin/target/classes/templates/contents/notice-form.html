<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>お知らせフォーム</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <main class="main content-page">
        <h1 class="page-title" th:text="${pageTitle}"></h1>
        <form th:action="@{/contents/notices/save}" th:object="${notice}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="field"><label>タイトル</label><input th:field="*{title}"></div>
            <div class="field"><label>本文</label><textarea rows="8" th:field="*{body}"></textarea></div>
            <div class="field"><label>公開日時</label><input type="datetime-local" th:field="*{publishedAt}"></div>
            <div class="actions"><a class="btn secondary" th:href="@{/contents}">戻る</a><button class="btn" type="submit">保存</button></div>
        </form>
    </main>
</div>
</body>
</html>
