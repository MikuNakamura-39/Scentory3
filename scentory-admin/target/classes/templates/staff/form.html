<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>スタッフフォーム</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <main class="main">
        <h1 class="page-title" th:text="${pageTitle}"></h1>
        <form th:action="@{/staff/save}" th:object="${staff}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="grid two">
                <div class="field"><label>氏名</label><input th:field="*{name}"><small class="field-error" th:errors="*{name}"></small></div>
                <div class="field"><label>メールアドレス</label><input th:field="*{email}"><small class="field-error" th:errors="*{email}"></small></div>
                <div class="field"><label>電話番号</label><input th:field="*{phone}"><small class="field-error" th:errors="*{phone}"></small></div>
                <div class="field"><label>権限</label><select th:field="*{roleType}"><option value="">選択してください</option><option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option></select><small class="field-error" th:errors="*{roleType}"></small></div>
            </div>
            <div class="actions"><a class="btn secondary" th:href="@{/staff}">戻る</a><button class="btn" type="submit">保存</button></div>
        </form>
    </main>
</div>
</body>
</html>
