<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード再設定</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="auth-wrap public-page-wrap">
    <section class="auth-card auth-card-simple public-page-card">
        <div class="auth-logo-wrap">
            <img class="auth-logo" th:src="@{/images/scentory-logo.svg}" alt="Scentory">
        </div>
        <h1 class="page-title public-page-title">パスワード再設定</h1>
        <p class="public-page-copy">登録メールアドレスを入力すると、再設定案内を送信します。</p>
        <form>
            <div class="field">
                <label>メールアドレス</label>
                <input type="email" placeholder="example@scentory.jp">
            </div>
            <div class="public-page-actions">
                <a class="btn secondary" th:href="@{/login}">戻る</a>
                <button class="btn" type="button">再設定メール送信</button>
            </div>
        </form>
    </section>
</div>
</body>
</html>
