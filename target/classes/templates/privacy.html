<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プライバシーポリシー</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="auth-wrap public-page-wrap">
    <section class="auth-card public-page-card public-page-content-card">
        <div class="auth-logo-wrap">
            <img class="auth-logo" th:src="@{/images/scentory-logo.svg}" alt="Scentory">
        </div>
        <h1 class="page-title public-page-title">プライバシーポリシー</h1>
        <div class="public-page-content">
            <p>本ページは個人情報保護方針の確認用画面です。</p>
            <p>実運用時には、取得情報、利用目的、第三者提供、問い合わせ窓口などを正式に記載してください。</p>
        </div>
        <div class="public-page-actions">
            <a class="btn secondary" th:href="@{/login}">戻る</a>
        </div>
    </section>
</div>
</body>
</html>
