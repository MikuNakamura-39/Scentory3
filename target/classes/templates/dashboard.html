<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ダッシュボード</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <main class="main">
        <div class="page-header">
            <h1 class="page-title">ダッシュボード</h1>
        </div>
        <p class="dashboard-month-label" th:text="${dashboardMonthLabel}">3月</p>
        <div class="grid three dashboard-kpi-grid">
            <div class="card">
                <div class="subtle">予約数</div>
                <div class="kpi" th:text="${reservationCount}">0</div>
            </div>
            <div class="card">
                <div class="subtle">キャンセル率</div>
                <div class="kpi" th:text="${cancellationRate + '%'}">0%</div>
            </div>
            <div class="card">
                <div class="subtle">売上</div>
                <div class="kpi" th:text="${#numbers.formatDecimal(revenue,0,'COMMA',0,'POINT') + '円'}">0円</div>
            </div>
        </div>
        <div class="grid two" style="margin-top:18px;">
            <div class="card">
                <h2>本日の予約一覧</h2>
                <table>
                    <tr><th>予約番号</th><th>顧客</th><th>時間</th><th>状態</th></tr>
                    <tr th:each="item : ${todayReservations}">
                        <td data-label="予約番号" th:text="${item.reservationNumber}"></td>
                        <td data-label="顧客" th:text="${item.customer != null ? item.customer.fullName : '-'}"></td>
                        <td data-label="時間" th:text="${item.timeSlot != null ? #temporals.format(item.timeSlot.startAt, 'HH:mm') : '-'}"></td>
                        <td data-label="状態" th:text="${item.status.label}"></td>
                    </tr>
                </table>
            </div>
            <div class="card">
                <h2>直近の空き枠</h2>
                <table>
                    <tr><th>開始</th><th>スタッフ</th><th>予約数</th></tr>
                    <tr th:each="slot : ${availableSlots}">
                        <td data-label="開始" th:text="${#temporals.format(slot.startAt, 'MM/dd HH:mm')}"></td>
                        <td data-label="スタッフ" th:text="${slot.staff != null ? slot.staff.name : '-'}"></td>
                        <td data-label="予約数" th:text="${slot.bookedCount + '/' + slot.capacity}"></td>
                    </tr>
                </table>
                <h2 style="margin-top:20px;">お知らせ</h2>
                <ul>
                    <li th:each="notice : ${notices}" th:text="${notice.title}"></li>
                </ul>
            </div>
        </div>
    </main>
</div>
</body>
</html>
