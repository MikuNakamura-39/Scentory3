<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>予約フォーム</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
    <main class="main">
        <h1 class="page-title" th:text="${pageTitle}">予約フォーム</h1>
        <form th:action="@{/reservations/save}" th:object="${reservation}" method="post" class="reservation-form">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{reservationNumber}">
            <div class="grid two">
                <div class="field"><label>予約番号</label><input type="text" th:value="${reservationNumberDisplay}" readonly><small class="field-error" th:errors="*{reservationNumber}"></small></div>
                <div class="field"><label>ステータス</label><select th:field="*{status}"><option value="">選択してください</option><option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.label}"></option></select><small class="field-error" th:errors="*{status}"></small></div>
                <div class="field"><label>顧客名</label><input type="text" name="customerName" th:value="${customerName}"><small class="field-error" th:errors="*{customer}"></small></div>
                <div class="field"><label>人数</label><select th:field="*{partySize}"><option value="">選択してください</option><option th:each="count : ${#numbers.sequence(1,10)}" th:value="${count}" th:text="${count + '名'}"></option></select><small class="field-error" th:errors="*{partySize}"></small></div>
                <div class="field field-split">
                    <label>予約日時</label>
                    <div class="field-split-row">
                        <input type="date" name="reservationDateOnly" th:value="${reservationDateOnly}">
                        <select name="reservationTimeOnly">
                            <option value="">時間を選択</option>
                            <option th:each="time : ${timeOptions}" th:value="${time}" th:text="${time}" th:selected="${reservationTimeOnly == time}"></option>
                        </select>
                    </div>
                    <small class="field-error" th:errors="*{timeSlot}"></small>
                </div>
                <div class="field">
                    <label>メニュー</label>
                    <select th:field="*{workshopMenu}">
                        <option value="">選択してください</option>
                        <option th:each="m : ${menus}" th:value="${m.id}" th:text="${m.name}"></option>
                    </select>
                    <small class="field-error" th:errors="*{workshopMenu}"></small>
                </div>
                <div class="field"><label>担当スタッフ</label><select th:field="*{assignedStaff}"><option value="">未設定</option><option th:each="s : ${staffs}" th:value="${s.id}" th:text="${s.name}"></option></select></div>
                <div class="field">
                    <label>チャネル</label>
                    <select th:field="*{channel}">
                        <option value="">選択してください</option>
                        <option th:each="item : ${channels}" th:value="${item}" th:text="${item}"></option>
                    </select>
                    <small class="field-error" th:errors="*{channel}"></small>
                </div>
            </div>
            <div class="actions"><a class="btn secondary" th:href="@{/reservations}">戻る</a><button class="btn" type="submit">保存</button></div>
        </form>
    </main>
</div>
</body>
</html>
