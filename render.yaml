services:
  - type: web
    name: scentory3-admin
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: scentory3-db
          property: connectionString
      - key: DATABASE_DRIVER
        value: org.postgresql.Driver
      - key: DATABASE_USERNAME
        fromDatabase:
          name: scentory3-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: scentory3-db
          property: password
      - key: H2_CONSOLE_ENABLED
        value: false
      - key: JPA_DDL_AUTO
        value: update

databases:
  - name: scentory3-db
    plan: free
